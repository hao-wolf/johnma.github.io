---
layout: home
title: My Blog
---

<h1>Latest Posts</h1>
<ul>
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %d, %Y" }}</time>
      <!-- Optional: Display an excerpt -->
      <!-- {{ post.excerpt }} -->
    </li>
  {% endfor %}
</ul>
